<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Conheça os serviços, projetos e canais de atendimento da Cris Lopes Art."
  >

  <meta name="theme-color" content="#0c0420">

  <!-- Favicon -->

    rel="icon"

  <link
